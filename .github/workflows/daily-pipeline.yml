name: Daily Songs Metrics Pipeline

on:
  schedule:
    - cron: '20 14 * * *' # 18:30 UTC = 03:30 AM KHR (Next Day)
  workflow_dispatch:
concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install

      - name: Run Full Pipeline
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          NEXT_PUBLIC_SHEET_ID: ${{ secrets.NEXT_PUBLIC_SHEET_ID }}
        run: |
          node scripts/update-songs-node.mjs
          node scripts/daily-snapshot-node.mjs
          node scripts/generate-ranking-node.mjs
          node scripts/post-fb-node.mjs
          node scripts/vectorize-songs-node.mjs
