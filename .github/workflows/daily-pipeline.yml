name: Daily Songs Metrics Pipeline

on:
  schedule:
    - cron: '0 11 * * *' # 11:00 UTC = 20:00 JST
  workflow_dispatch:

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  youtube-core:
    name: Layer 1 - YouTube Data Collection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install

      - name: Sync Artists & Songs (YouTube API)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEXT_PUBLIC_SHEET_ID: ${{ secrets.NEXT_PUBLIC_SHEET_ID }}
        run: |
          node scripts/sync-artists-master.mjs
          node scripts/sync-sheets-to-bq.mjs
          node scripts/update-songs-schema-labels.mjs
          node scripts/update-songs-node.mjs
          node scripts/cleanup-ng-songs.mjs --delete --sheet=SONGS
          node scripts/cleanup-ng-songs.mjs --delete --sheet=SONGS_LONG
          node scripts/backfill-detected-artists.mjs
          node scripts/auto-register-roster.mjs
          node scripts/sync-sheets-to-bq.mjs
          node scripts/daily-snapshot-node.mjs

  processing:
    name: Layer 2 - Ranking, Social & AI
    needs: youtube-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install

      - name: Generate Ranking & Post
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          NEXT_PUBLIC_SHEET_ID: ${{ secrets.NEXT_PUBLIC_SHEET_ID }}
        run: |
          node scripts/generate-ranking-node.mjs
          node scripts/post-fb-node.mjs
          node scripts/vectorize-songs-node.mjs
